# NexAuctionHouse - English Language File

prefix: "<gray>[<gradient:#FF6B6B:#FFD93D>NexAuction</gradient><gray>] "

# General messages
general:
  reload: "<green>Configuration reloaded successfully."
  no-permission: "<red>You don't have permission to do that."
  player-only: "<red>This command can only be used by players."
  invalid-usage: "<red>Invalid usage. Use <yellow>/ah help <red>for help."

# Auction messages
auction:
  listed: "<green>Your item has been listed for <yellow>{price}<green>!"
  purchased: "<green>You purchased <yellow>{item} <green>for <yellow>{price}<green>."
  sold: "<green>Your <yellow>{item} <green>has been sold for <yellow>{price}<green>! (Tax: <red>{tax}<green>)"
  cancelled: "<yellow>Your auction has been cancelled. Item returned."
  expired: "<red>Your auction for <yellow>{item} <red>has expired."
  collected: "<green>You collected <yellow>{amount} <green>expired items."
  price-updated: "<green>Auction price updated to <yellow>{price}<green>."
  duration-extended: "<green>Auction extended by <yellow>{hours} hour(s)<green>."
  extend-failed: "<red>Cannot extend further. Maximum duration reached."
  enter-new-price: "<yellow>Enter the new price in chat. <gray>(Min: {min} / Max: {max})"
  type-cancel: "<gray>Type <yellow>cancel <gray>to go back."
  price-edit-cancelled: "<yellow>Price edit cancelled."
  invalid-price: "<red>Invalid price. Please enter a valid number."

  # Offline queue messages
  offline-revenue-single: "<green>Your <yellow>{item} <green>was sold to <yellow>{buyer}<green>! Revenue: <yellow>{amount}"
  offline-revenue-summary: "<green>You earned revenue from <yellow>{count} <green>sales while offline! Total: <yellow>{total}"
  offline-items-waiting: "<yellow>You have <green>{amount} <yellow>item(s) waiting to be collected. Use <green>/ah expired<yellow>."
  rescued-items: "<green>{amount} item(s) were recovered from a previous session and returned to your inventory."
  rescued-items-stored: "<yellow>{amount} rescued item(s) couldn't fit in your inventory. Use <green>/ah expired <yellow>to collect them."

  # Error messages
  no-item-in-hand: "<red>You must hold an item in your hand."
  blacklisted-item: "<red>This item cannot be listed on the auction house."
  price-too-low: "<red>The minimum price is <yellow>{min}<red>."
  price-too-high: "<red>The maximum price is <yellow>{max}<red>."
  listing-limit-reached: "<red>You have reached your listing limit of <yellow>{limit}<red> items."
  not-enough-money: "<red>You don't have enough money. Required: <yellow>{price}"
  cannot-buy-own: "<red>You cannot buy your own item."
  auction-not-found: "<red>This auction no longer exists."
  inventory-full: "<red>Your inventory is full!"
  invalid-currency: "<red>Invalid currency! Available: <yellow>{currencies}"
  listing-cancelled: "<yellow>Listing cancelled. Item returned to your hand."
  broadcast: "<green>{seller} <gray>listed <yellow>{item} <gray>for <green>{price}<gray>!"
  broadcast-bid: "<green>{seller} <gray>started an auction for <yellow>{item} <gray>starting at <green>{price}<gray>!"

# Admin messages
admin:
  removed: "<green>Auction removed. Item returned to <yellow>{player}<green>."
  force-removed: "<red>An admin removed your auction for <yellow>{item}<red>."
  cleared: "<green>Cleared <yellow>{count}<green> auctions. Items returned to sellers."
  cleared-player: "<green>Cleared <yellow>{count}<green> auctions for player <yellow>{player}<green>."
  stats-active: "<gray>Active auctions: <yellow>{count}"
  stats-value: "<gray>Total value: <green>{value}"
  search-usage: "<red>Usage: <yellow>/ah admin search <player>"
  remove-usage: "<red>Usage: <yellow>/ah admin remove <id>"
  clear-usage: "<red>Usage: <yellow>/ah admin clear --all <red>or <yellow>/ah admin clear --player=<name>"
  invalid-id: "<red>Invalid auction ID."
  help: "<yellow>/ah admin <gray>- Open admin panel"
  help-search: "<yellow>/ah admin search <player> <gray>- Search player's auctions"
  help-remove: "<yellow>/ah admin remove <id> <gray>- Remove auction by ID"
  help-clear: "<yellow>/ah admin clear --all <gray>- Clear all auctions"
  help-clear-player: "<yellow>/ah admin clear --player=<name> <gray>- Clear player's auctions"
  help-stats: "<yellow>/ah admin stats <gray>- View auction stats"
  help-blacklist: "<yellow>/ah admin blacklist <gray>- Manage blacklist settings"

# Blacklist messages
blacklist:
  world-disabled: "<red>The auction house is disabled in this world."
  material-price-too-low: "<red>Minimum price for <yellow>{material}<red> is <yellow>{min}<red>."
  material-price-too-high: "<red>Maximum price for <yellow>{material}<red> is <yellow>{max}<red>."
  mode-changed: "<green>Blacklist mode changed to <yellow>{mode}<green>."
  enter-value: "<yellow>Enter the {type} to add. <gray>Type 'cancel' to go back."
  action-cancelled: "<yellow>Action cancelled."
  added: "<green>Added <yellow>{value}<green> to the blacklist."
  removed: "<red>Removed <yellow>{value}<red> from the blacklist."
  already-exists: "<yellow>{value}<yellow> is already in the list."
  list-empty: "<red>The list is already empty."

# Search and sort messages
search:
  enter-query: "<yellow>Type your search query in chat. <gray>(item name, material, or seller)"
  search-cancelled: "<yellow>Search cancelled."
  search-usage: "<red>Usage: <yellow>/ah search <keyword>"
  no-results: "<yellow>No items found matching <green>{query}<yellow>."
  active-query: "<green>Searching: <white>{query}"
  click-to-clear: "<yellow>Click to clear search."
  sort-newest: "Newest First"
  sort-oldest: "Oldest First"
  sort-price-asc: "Price: Low to High"
  sort-price-desc: "Price: High to Low"
  sort-name-asc: "Name: A to Z"
  sort-name-desc: "Name: Z to A"

# Bid / Auction messages
bid:
  listed: "<green>Your auction has been listed with a starting price of <yellow>{price}<green>!"
  placed: "<green>Bid placed! You bid <yellow>{amount} <green>on <yellow>{item}<green>."
  outbid: "<red>You have been outbid on <yellow>{item}<red>! New bid: <yellow>{amount} <red>by <yellow>{bidder}<red>. You have been refunded."
  new-bid-seller: "<green>New bid on your <yellow>{item}<green>! <yellow>{bidder} <green>bid <yellow>{amount}<green>."
  already-highest: "<red>You are already the highest bidder."
  bid-too-low: "<red>Your bid is too low. Minimum bid: <yellow>{min}"
  auction-won-buyer: "<green>Congratulations! You won the auction for <yellow>{item} <green>at <yellow>{price}<green>!"
  auction-won-seller: "<green>Your auction for <yellow>{item} <green>was won by <yellow>{winner}<green>! Revenue: <yellow>{price} <green>(Tax: <red>{tax}<green>)"
  refund: "<green>Your bid on <yellow>{item} <green>has been refunded. Amount: <yellow>{amount}"
  cannot-cancel-with-bids: "<red>You cannot cancel a bid auction that has active bids."
  bid-disabled: "<red>The bid system is currently disabled."
  enter-bid-amount: "<yellow>Enter your bid amount in chat. <gray>(Minimum: {min})"
  bid-cancelled: "<yellow>Bid cancelled."
  no-bids-yet: "No bids yet"

# Favorites / Watchlist messages
favorites:
  added: "<light_purple>★ <green>Added <yellow>{item} <green>to your favorites!"
  removed: "<gray>★ <yellow>Removed <yellow>{item} <yellow>from your favorites."
  limit-reached: "<red>You have reached your favorites limit of <yellow>{limit}<red>."
  empty: "<yellow>Your favorites list is empty."
  notify-sold: "<light_purple>★ <green>A favorited item <yellow>{item} <green>by <yellow>{seller} <green>has been sold!"
  notify-cancelled: "<light_purple>★ <yellow>A favorited item <yellow>{item} <yellow>by <yellow>{seller} <yellow>has been cancelled."
  notify-expired: "<light_purple>★ <gray>A favorited item <yellow>{item} <gray>by <yellow>{seller} <gray>has expired."

# Transaction History messages
history:
  empty: "<yellow>No transaction history found."
  player-not-found: "<red>Player not found or has never played on this server."

# Preview messages
preview:
  right-click-hint: "<gray>Right-click to preview item details."

# Notification settings messages
notifications:
  toggled: "{setting} <gray>is now {status}<gray>."
  enabled: "<green>enabled"
  disabled: "<red>disabled"
  sale: "<yellow>Sale Notifications"
  bid: "<aqua>Bid Notifications"
  sound: "<green>Sound Effects"
  login: "<white>Login Notifications"
  favorite: "<light_purple>Favorite Notifications"

# Auto-relist messages
auto-relist:
  enabled: "<green>Auto-Relist enabled! Your item will be relisted up to <yellow>{max}<green> times."
  relisted: "<green>Your <yellow>{item} <green>has been automatically relisted! <gray>(Relist #{count})"
  limit-reached: "<red>Auto-relist limit reached for <yellow>{item}<red>. Moved to expired items."
  failed-balance: "<red>Auto-relist failed for <yellow>{item}<red>! Insufficient balance. Cost: <yellow>{cost}"
  feature-disabled: "<red>Auto-relist feature is currently disabled."

# Bulk sell messages
bulk:
  sell-all-usage: "<red>Usage: <yellow>/ah sell-all <price> [currency]"
  listed: "<green>Successfully listed <yellow>{count}<green> item(s) for <yellow>{price}<green> each!"
  skipped: "<yellow>{count}<yellow> item(s) were skipped (blacklisted or failed)."
  limit-warning: "<yellow>{count}<yellow> item(s) could not be listed due to your listing limit (<yellow>{limit}<yellow>)."
  no-items-selected: "<red>No items selected! Click items to select them first."
  enter-price: "<yellow>Enter the price per item (and optionally a currency). <gray>Example: 100 money"

# Bundle messages
bundle:
  usage: "<red>Usage: <yellow>/ah bundle <price> [currency]"
  disabled: "<red>Bundle listings are currently disabled."
  listed: "<green>Bundle created with <yellow>{count}<green> item(s) for <yellow>{price}<green>!"
  create-failed: "<red>Failed to create the bundle listing. Your items have been returned."
  min-items: "<red>You must select at least <yellow>{min}<red> items for a bundle."
  max-items: "<red>Bundle is full! Maximum <yellow>{max}<red> items allowed."
  bundle-limit: "<red>You have reached your bundle listing limit (<yellow>{limit}<red>)."
  contains-blacklisted: "<red>Cannot create bundle — <yellow>{item}<red> is blacklisted."
  inventory-full: "<red>Not enough inventory space! You need <yellow>{required}<red> empty slots but only have <yellow>{available}<red>."

# Time format
time:
  hours: "{value}h"
  minutes: "{value}m"
  seconds: "{value}s"
  expired: "Expired"

# Migration messages
migration:
  usage: "<red>Usage: <yellow>/ah admin migrate <plugin> <gray>— Supported: {plugins}"
  unsupported-plugin: "<red>Unknown plugin: <yellow>{plugin}<red>. Supported: <yellow>{plugins}"
  validation-failed: "<red>Migration validation failed: <yellow>{error}"
  already-running: "<red>A migration is already in progress. Please wait."
  confirm-warning: "<yellow>⚠ You are about to migrate data from <gold>{plugin}<yellow>."
  confirm-prompt: "<yellow>A backup of your database will be created first. Type <green>confirm<yellow> to proceed or <red>cancel<yellow> to abort."
  cancelled: "<gray>Migration cancelled."
  starting: "<yellow>Starting migration from <gold>{plugin}<yellow>... This may take a moment."
  failed: "<red>Migration from <yellow>{plugin}<red> failed. Check the console for details."
  completed: "<green>Migration from <yellow>{plugin}<green> completed in <yellow>{time}s<green>! Auctions: <yellow>{auctions}<green>, Expired: <yellow>{expired}<green>, Logs: <yellow>{logs}<green>, Errors: <red>{errors}"
