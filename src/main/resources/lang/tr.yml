# NexAuctionHouse - Turkce Dil Dosyasi

prefix: "<gray>[<gradient:#FF6B6B:#FFD93D>NexAuction</gradient><gray>] "

# Genel mesajlar
general:
  reload: "<green>Konfigurasyon basariyla yeniden yuklendi."
  no-permission: "<red>Bu islemi yapmaya yetkiniz yok."
  player-only: "<red>Bu komut sadece oyuncular tarafindan kullanilabilir."
  invalid-usage: "<red>Gecersiz kullanim. Yardim icin <yellow>/ah help <red>yazin."

# Ihale mesajlari
auction:
  listed: "<green>Esyaniz <yellow>{price}<green> fiyatla satisa konuldu!"
  purchased: "<green><yellow>{item} <green>esyasini <yellow>{price}<green> karsiliginda satin aldiniz."
  sold: "<green><yellow>{item} <green>esyaniz <yellow>{price}<green> karsiliginda satildi! (Vergi: <red>{tax}<green>)"
  cancelled: "<yellow>Ihaleniz iptal edildi. Esya iade edildi."
  expired: "<red><yellow>{item} <red>icin ihalenizin suresi doldu."
  collected: "<green>Suresi dolmus <yellow>{amount} <green>esya toplandi."
  price-updated: "<green>Ihale fiyati <yellow>{price}<green> olarak guncellendi."
  duration-extended: "<green>Ihale suresi <yellow>{hours} saat<green> uzatildi."
  extend-failed: "<red>Daha fazla uzatilamaz. Maksimum sureye ulasildi."
  enter-new-price: "<yellow>Yeni fiyati sohbete yazin. <gray>(Min: {min} / Maks: {max})"
  type-cancel: "<gray>Geri donmek icin <yellow>cancel <gray>yazin."
  price-edit-cancelled: "<yellow>Fiyat duzenlemesi iptal edildi."
  invalid-price: "<red>Gecersiz fiyat. Lutfen gecerli bir sayi girin."

  # Cevrimdisi kuyruk mesajlari
  offline-revenue-single: "<green><yellow>{item} <green>esyaniz <yellow>{buyer}<green> tarafindan satin alindi! Gelir: <yellow>{amount}"
  offline-revenue-summary: "<green>Cevrimdisiyken <yellow>{count} <green>satis yapildi! Toplam: <yellow>{total}"
  offline-items-waiting: "<yellow>Toplanmayi bekleyen <green>{amount} <yellow>esyaniz var. <green>/ah expired <yellow>ile toplayin."
  rescued-items: "<green>Onceki oturumdan <yellow>{amount} <green>esya kurtarildi ve envanterinize iade edildi."
  rescued-items-stored: "<yellow>Kurtarilan {amount} esya envanterinize sigmadi. <green>/ah expired <yellow>ile toplayin."

  # Hata mesajlari
  no-item-in-hand: "<red>Elinizde bir esya tutmalisiniz."
  blacklisted-item: "<red>Bu esya ihale evinde satisa konulamaz."
  price-too-low: "<red>Minimum fiyat <yellow>{min}<red>."
  price-too-high: "<red>Maksimum fiyat <yellow>{max}<red>."
  listing-limit-reached: "<red>Listeleme limitinize ulastiniz: <yellow>{limit}<red> esya."
  not-enough-money: "<red>Yeterli paraniz yok. Gereken: <yellow>{price}"
  cannot-buy-own: "<red>Kendi esyanizi satin alamazsiniz."
  auction-not-found: "<red>Bu ihale artik mevcut degil."
  inventory-full: "<red>Envanteriniz dolu!"
  invalid-currency: "<red>Gecersiz para birimi! Mevcut: <yellow>{currencies}"

# Admin mesajlari
admin:
  removed: "<green>Ihale kaldirildi. Esya <yellow>{player}<green> oyuncusuna iade edildi."
  force-removed: "<red>Bir yonetici <yellow>{item}<red> esyanizin ihalesini kaldirdi."
  cleared: "<green><yellow>{count}<green> ihale temizlendi. Esyalar sahiplerine iade edildi."
  stats-active: "<gray>Aktif ihaleler: <yellow>{count}"
  stats-value: "<gray>Toplam deger: <green>{value}"
  search-usage: "<red>Kullanim: <yellow>/ah admin search <oyuncu>"
  remove-usage: "<red>Kullanim: <yellow>/ah admin remove <id>"
  invalid-id: "<red>Gecersiz ihale ID."
  help: "<yellow>/ah admin <gray>- Yonetim panelini ac"
  help-search: "<yellow>/ah admin search <oyuncu> <gray>- Oyuncunun ihalelerini ara"
  help-remove: "<yellow>/ah admin remove <id> <gray>- Ihaleyi ID ile kaldir"
  help-clear: "<yellow>/ah admin clear <gray>- Tum ihaleleri temizle"
  help-stats: "<yellow>/ah admin stats <gray>- Ihale istatistiklerini gor"

# Arama ve siralama mesajlari
search:
  enter-query: "<yellow>Arama sorgunuzu sohbete yazin. <gray>(esya adi, materyal veya satici)"
  search-cancelled: "<yellow>Arama iptal edildi."
  search-usage: "<red>Kullanim: <yellow>/ah search <kelime>"
  no-results: "<yellow><green>{query}<yellow> ile eslesen esya bulunamadi."
  active-query: "<green>Araniyor: <white>{query}"
  click-to-clear: "<yellow>Aramayi temizlemek icin tiklayin."
  sort-newest: "En Yeni"
  sort-oldest: "En Eski"
  sort-price-asc: "Fiyat: Dusukten Yuksege"
  sort-price-desc: "Fiyat: Yuksekten Dusuge"
  sort-name-asc: "Isim: A'dan Z'ye"
  sort-name-desc: "Isim: Z'den A'ya"

# Zaman formati
time:
  hours: "{value}sa"
  minutes: "{value}dk"
  seconds: "{value}sn"
  expired: "Suresi doldu"
