# NexAuctionHouse - Sell Confirmation GUI Configuration

title: "<dark_gray>Confirm Listing"
size: 27

buttons:
  confirm:
    slot: 11
    material: LIME_STAINED_GLASS_PANE
    name: "<green>Confirm Listing"
    lore:
      - ""
      - "<gray>Price: <green>{price}"
      - "<gray>Duration: <yellow>{duration}"
      - "<gray>Tax Rate: <red>{tax}%"
      - ""
      - "<yellow>Click to list your item!"

  cancel:
    slot: 15
    material: RED_STAINED_GLASS_PANE
    name: "<red>Cancel"
    lore:
      - ""
      - "<gray>Cancel and return the item."

  # The item being listed will be displayed here
  display-item:
    slot: 13

filler:
  enabled: true
  material: GRAY_STAINED_GLASS_PANE
  name: " "
