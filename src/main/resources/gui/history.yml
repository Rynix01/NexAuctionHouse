# Lore template for items you sold
sale-item-lore:
  - ""
  - "<dark_gray>━━━━━━━━━━━━━━━━━━━━━━━━━"
  - "<green>[SOLD]"
  - "<gray>Buyer: <white>{buyer}"
  - "<gray>Price: <green>{price}"
  - "<gray>Tax: <red>{tax}"
  - "<gray>Revenue: <green>{revenue}"
  - "<gray>Time: <yellow>{time} ago"
  - "<dark_gray>━━━━━━━━━━━━━━━━━━━━━━━━━"

# Lore template for items you purchased
purchase-item-lore:
  - ""
  - "<dark_gray>━━━━━━━━━━━━━━━━━━━━━━━━━"
