# NexAuctionHouse - Transaction History GUI Configuration

title: "<dark_gray>Transaction History"
size: 54

# Slot layout for history items
item-slots:
  - 10
  - 11
  - 12
  - 13
  - 14
  - 15
  - 16
  - 19
  - 20
  - 21
  - 22
  - 23
  - 24
  - 25
  - 28
  - 29
  - 30
  - 31
  - 32
  - 33
  - 34

# Navigation and utility buttons
buttons:
  previous-page:
    slot: 48
    material: ARROW
    name: "<yellow>Previous Page"
    lore:
      - "<gray>Click to go back."

  next-page:
    slot: 50
    material: ARROW
    name: "<yellow>Next Page"
    lore:
      - "<gray>Click to go forward."

  back:
    slot: 45
    material: DARK_OAK_DOOR
    name: "<yellow>Back"
    lore:
      - "<gray>Return to the main menu."

  close:
    slot: 53
    material: BARRIER
    name: "<red>Close"
    lore:
      - "<gray>Close the menu."

# Filler glass pane for decoration
filler:
  enabled: true
  material: GRAY_STAINED_GLASS_PANE
  name: " "
  slots:
