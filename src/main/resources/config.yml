# ===============================================
# NexAuctionHouse Configuration
# ===============================================

general:
  # Default language (file must exist in lang/ folder)
  language: en

  # Default auction duration in hours
  default-auction-duration: 48

  # Maximum auction duration in hours
  max-auction-duration: 72

  # Minimum and maximum price limits
  min-price: 1.0
  max-price: 1000000.0

  # Default number of items a player can list at once
  # Override with permission: nexauctions.limit.<number>
  default-listing-limit: 5

  # Days to keep expired items before permanent deletion
  expired-item-keep-days: 7

  # Show a confirmation GUI before listing an item for sale
  confirm-sell-gui: true

# Economy providers configuration
# Multiple economies can be active simultaneously.
# Players choose currency when listing: /ah sell <price> <currency>
# For multi-currency plugins (CoinsEngine, GemsEconomy, EcoBits, UltraEconomy),
# set 'plugin-currency' to the currency ID defined in that plugin.
economy:
  providers:
    vault:
      enabled: true
      display-name: "Money"
      currency-name: "money"
    playerpoints:
      enabled: false
      display-name: "Points"
      currency-name: "points"
    tokenmanager:
      enabled: false
      display-name: "Tokens"
      currency-name: "tokens"
    coinsengine:
      enabled: false
      display-name: "Gems"
      currency-name: "gems"
      plugin-currency: "gems"
    gemseconomy:
      enabled: false
      display-name: "Gems"
      currency-name: "gems"
      plugin-currency: "gems"
    ecobits:
      enabled: false
      display-name: "Bits"
      currency-name: "bits"
      plugin-currency: "bits"
    ultraeconomy:
      enabled: false
      display-name: "Coins"
      currency-name: "coins"
      plugin-currency: "coins"

# Database configuration
database:
  # Type: 'sqlite' or 'mysql'
  type: sqlite

  mysql:
    host: localhost
    port: 3306
    database: nexauctionhouse
    username: root
    password: ''
    use-ssl: false

# Tax system
tax:
  enabled: true
  # Default tax percentage taken from sales
  # Override with permission: nexauctions.tax.<percentage>
  default-rate: 10.0

# Bid / Auction system
bid:
  # Enable the bid (auction) system. If false, only BIN listings are allowed.
  enabled: true
  # Minimum bid increment percentage (e.g. 5 means each new bid must be >= 5% higher)
  min-increment-percent: 5.0
  # Anti-snipe: if a bid is placed within this many seconds before expiry, extend the auction
  anti-snipe-seconds: 300
  # Default duration for bid auctions in hours (can differ from BIN duration)
  default-duration: 24

# Favorites / Watchlist system
favorites:
  # Maximum number of favorites per player
  max-favorites: 50

# Price History & Statistics
stats:
  # How often (in minutes) to refresh the average price cache
  cache-duration-minutes: 10
  # Maximum number of transactions shown in /ah history
  history-limit: 50

# Blacklisted items that cannot be listed
blacklist:
  # Blacklist mode: 'blacklist' (block listed items) or 'whitelist' (only allow listed items)
  mode: blacklist

  materials:
    - BEDROCK
    - BARRIER
    - COMMAND_BLOCK
    - CHAIN_COMMAND_BLOCK
    - REPEATING_COMMAND_BLOCK
    - COMMAND_BLOCK_MINECART
    - STRUCTURE_BLOCK
    - STRUCTURE_VOID
    - JIGSAW
    - DEBUG_STICK
    - SPAWNER
  lore-keywords:
    - "Soulbound"
    - "Untradeable"
  # Custom item IDs from third-party plugins (format: "plugin:item_id")
  # Use /ah admin to discover item IDs when listing
  custom-items: []
  #  - "itemsadder:forbidden_sword"
  #  - "mmoitems:SWORD:FORBIDDEN_BLADE"
  #  - "oraxen:banned_item"

  # Enchantment blacklist - items containing these enchantments cannot be listed
  # Use Bukkit enchantment names (e.g. SHARPNESS, MENDING, SILK_TOUCH)
  enchantments: []
  #  - "MENDING"
  #  - "SILK_TOUCH"

  # NBT tag blacklist - items containing any of these NBT keys cannot be listed
  # Checks in the item's PersistentDataContainer using NamespacedKeys (format: "namespace:key")
  nbt-tags: []
  #  - "myplugin:soulbound"
  #  - "customplugin:untradeable"

  # World blacklist - auction house cannot be used in these worlds
  disabled-worlds: []
  #  - "world_pvp"
  #  - "world_minigames"

  # Whitelist materials - only these materials can be listed when mode is 'whitelist'
  whitelist-materials: []
  #  - "DIAMOND_SWORD"
  #  - "NETHERITE_SWORD"

  # Per-material price limits (overrides global min/max price for specific materials)
  material-price-limits: {}
  #  DIAMOND:
  #    min: 10.0
  #    max: 500.0
  #  NETHERITE_INGOT:
  #    min: 100.0
  #    max: 10000.0

# Discord webhook integration
discord:
  enabled: false
  webhook-url: ''
  # Embed colors (decimal)
  colors:
    sale: 5763719       # green
    listing: 3447003    # blue
    cancel: 15548997    # red
    admin: 16776960     # yellow

# Notification preferences
notifications:
  # Default preference states for new players (can be overridden per player)
  defaults:
    sale-notifications: true
    bid-notifications: true
    sound-effects: true
    login-notifications: true
    favorite-notifications: true
  # Sound effects played for various events
  sounds:
    sale: "ENTITY_EXPERIENCE_ORB_PICKUP"
    bid: "ENTITY_ARROW_HIT_PLAYER"
    favorite: "BLOCK_NOTE_BLOCK_CHIME"
    rescued: "ENTITY_ITEM_PICKUP"

# Auto-relist system
auto-relist:
  # Enable the auto-relist feature globally
  enabled: true
  # Maximum number of times an item can be automatically relisted
  max-relists: 3
  # Cost percentage of the listing price charged per relist (0 = free)
  cost-percent: 0.0

# Bundle system - list multiple items as a single auction
bundles:
  # Enable the bundle system
  enabled: true
  # Maximum number of items per bundle
  max-items: 9
  # Minimum number of items per bundle
  min-items: 2
  # Maximum active bundle listings per player (0 = use default listing limit)
  bundle-limit: 0
